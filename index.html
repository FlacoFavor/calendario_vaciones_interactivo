<body>
     <div class="container">
        <h1>Selecciona tus Días de Vacaciones</h1>
        <div class="calendar-header">
			<h2 id="anno-actual"></h2>
            <button onclick="cambiarMes(-1)">Anterior</button>
            <h2 id="mes-actual"></h2>
            <button onclick="cambiarMes(1)">Siguiente</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <!-- Los días de la semana y las fechas se generarán aquí con JavaScript -->
        </div>
        <p>Días seleccionados: <span id="dias-seleccionados">0</span></p>
        <button onclick="reiniciarSeleccion()">Reiniciar</button>
    </div>
